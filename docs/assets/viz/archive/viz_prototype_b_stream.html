<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>試案B：テキストストリーム — 用法基盤モデル</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Yu Gothic', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background: #0a0a1a;
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        /* Left: streaming text area */
        .stream-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* Right: pattern panel */
        .pattern-panel {
            width: 280px;
            background: rgba(15, 15, 35, 0.95);
            border-left: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .panel-title {
            font-size: 15px; font-weight: bold; color: #f093fb;
            margin-bottom: 6px;
        }
        .panel-subtitle {
            font-size: 11px; color: rgba(255,255,255,0.5);
        }
        .pattern-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .pattern-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }
        .pattern-item.highlight {
            background: rgba(240, 147, 251, 0.12);
            border-color: rgba(240, 147, 251, 0.3);
        }
        .pattern-name {
            font-size: 15px; font-weight: bold; margin-bottom: 4px;
        }
        .pattern-count {
            font-size: 22px; font-weight: bold; color: #667eea;
            font-variant-numeric: tabular-nums;
        }
        .pattern-bar {
            height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 2px; margin-top: 6px; overflow: hidden;
        }
        .pattern-bar-fill {
            height: 100%; border-radius: 2px;
            transition: width 0.5s ease;
        }
        .pattern-example {
            font-size: 11px; color: rgba(255,255,255,0.5);
            margin-top: 6px; line-height: 1.4;
        }
        .panel-footer {
            padding: 14px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
        }
        button {
            padding: 8px 18px; font-size: 12px;
            background: rgba(102, 126, 234, 0.5); color: white;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
            cursor: pointer; transition: all 0.3s;
            white-space: nowrap;
        }
        button:hover {
            background: rgba(118, 75, 162, 0.7);
            box-shadow: 0 3px 12px rgba(102, 126, 234, 0.3);
        }

        /* Overlay on stream area */
        .stream-overlay {
            position: absolute; top: 0; left: 0; right: 0;
            pointer-events: none; z-index: 10;
        }
        .stream-title {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            text-align: center;
        }
        .stream-title h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stream-title .sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; }

        .stream-stats {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px;
            background: rgba(255,255,255,0.06); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 28px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .sstat { text-align: center; }
        .sstat-num { font-size: 24px; font-weight: bold; font-variant-numeric: tabular-nums; }
        .sstat-label { font-size: 11px; color: rgba(255,255,255,0.5); }

        /* Mobile: stack vertically */
        @media (max-width: 700px) {
            body { flex-direction: column; }
            .pattern-panel { width: 100%; height: 200px; flex-direction: row; border-left: none; border-top: 1px solid rgba(255,255,255,0.1); }
            .panel-header { display: none; }
            .pattern-list { display: flex; overflow-x: auto; overflow-y: hidden; padding: 8px; gap: 8px; }
            .pattern-item { min-width: 140px; flex-shrink: 0; }
            .panel-footer { flex-direction: column; padding: 8px; }
            .stream-title h1 { font-size: 18px; }
        }
        @media (max-height: 500px) {
            .stream-title { top: 5px; }
            .stream-title h1 { font-size: 16px; }
            .stream-title .sub { display: none; }
            .stream-stats { bottom: 5px; padding: 6px 16px; }
            .sstat-num { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="stream-area">
        <canvas id="streamCanvas"></canvas>
        <div class="stream-overlay">
            <div class="stream-title">
                <h1>コーパスから浮かぶパターン</h1>
                <div class="sub">テキストが流れ、繰り返される構造が見えてくる</div>
            </div>
            <div class="stream-stats">
                <div class="sstat">
                    <div class="sstat-num" id="totalProcessed">0</div>
                    <div class="sstat-label">処理文数</div>
                </div>
                <div class="sstat">
                    <div class="sstat-num" id="totalPatterns">0</div>
                    <div class="sstat-label">検出パターン</div>
                </div>
            </div>
        </div>
    </div>

    <div class="pattern-panel">
        <div class="panel-header">
            <div class="panel-title">検出されたパターン</div>
            <div class="panel-subtitle">頻度が高いほど定着したパターンです</div>
        </div>
        <div class="pattern-list" id="patternList"></div>
        <div class="panel-footer">
            <button id="pauseBtn">一時停止</button>
            <button id="resetBtn">リセット</button>
            <button id="speedBtn">高速</button>
        </div>
    </div>

    <script>
    (() => {
        const canvas = document.getElementById('streamCanvas');
        const ctx = canvas.getContext('2d');

        // --- Corpus sentences with embedded patterns ---
        const patterns = [
            { id: 'teshimau', name: '〜てしまう', color: '#ff6b9d', examples: [] },
            { id: 'chau', name: '〜ちゃう', color: '#ff9b6b', examples: [] },
            { id: 'teiru', name: '〜ている', color: '#6b9dff', examples: [] },
            { id: 'teru', name: '〜てる', color: '#6bddff', examples: [] },
            { id: 'tari', name: '〜たり', color: '#b96bff', examples: [] },
            { id: 'rashii', name: '〜らしい', color: '#6bffa8', examples: [] },
        ];

        const sentences = [
            { text: '昨日の宿題を全部忘れてしまった。', matches: [{ pattern: 'teshimau', start: 10, end: 16 }] },
            { text: '毎朝コーヒーを飲んでいる。', matches: [{ pattern: 'teiru', start: 11, end: 15 }] },
            { text: 'ケーキ食べちゃった。', matches: [{ pattern: 'chau', start: 5, end: 10 }] },
            { text: '彼は今、本を読んでいる。', matches: [{ pattern: 'teiru', start: 9, end: 13 }] },
            { text: '週末は映画を見たり、買い物をしたりする。', matches: [{ pattern: 'tari', start: 8, end: 11 }, { pattern: 'tari', start: 17, end: 20 }] },
            { text: 'あの人は優しいらしい。', matches: [{ pattern: 'rashii', start: 8, end: 11 }] },
            { text: 'うっかり約束を忘れてしまった。', matches: [{ pattern: 'teshimau', start: 10, end: 16 }] },
            { text: '友達が待ってるよ。', matches: [{ pattern: 'teru', start: 5, end: 8 }] },
            { text: '全部食べてしまうつもりだった。', matches: [{ pattern: 'teshimau', start: 4, end: 10 }] },
            { text: '最近あの店が人気らしい。', matches: [{ pattern: 'rashii', start: 9, end: 12 }] },
            { text: '電車の中で音楽を聴いている人が多い。', matches: [{ pattern: 'teiru', start: 12, end: 16 }] },
            { text: 'つい言っちゃったんだ。', matches: [{ pattern: 'chau', start: 3, end: 8 }] },
            { text: '日曜日は掃除をしたり、洗濯をしたりする。', matches: [{ pattern: 'tari', start: 8, end: 11 }, { pattern: 'tari', start: 17, end: 20 }] },
            { text: '彼女はまだ寝ているみたい。', matches: [{ pattern: 'teiru', start: 6, end: 10 }] },
            { text: '大事な書類をなくしてしまった。', matches: [{ pattern: 'teshimau', start: 10, end: 16 }] },
            { text: '最近、太っちゃったなあ。', matches: [{ pattern: 'chau', start: 5, end: 10 }] },
            { text: '明日は雨が降るらしい。', matches: [{ pattern: 'rashii', start: 8, end: 11 }] },
            { text: '子どもが外で遊んでいる。', matches: [{ pattern: 'teiru', start: 8, end: 12 }] },
            { text: 'もう帰ってるんじゃない？', matches: [{ pattern: 'teru', start: 3, end: 6 }] },
            { text: '旅行では写真を撮ったり、お土産を買ったりした。', matches: [{ pattern: 'tari', start: 10, end: 13 }, { pattern: 'tari', start: 20, end: 23 }] },
            { text: 'また同じ間違いをしてしまった。', matches: [{ pattern: 'teshimau', start: 12, end: 18 }] },
            { text: 'もう食べちゃっていい？', matches: [{ pattern: 'chau', start: 3, end: 8 }] },
            { text: '窓の外を見てるだけだよ。', matches: [{ pattern: 'teru', start: 6, end: 9 }] },
            { text: 'あの映画は面白いらしいよ。', matches: [{ pattern: 'rashii', start: 9, end: 12 }] },
            { text: '朝から晩まで働いている。', matches: [{ pattern: 'teiru', start: 9, end: 13 }] },
        ];

        // --- State ---
        let isAnimating = true;
        let speed = 1;
        let sentenceIndex = 0;
        let totalProcessed = 0;
        let totalDetected = 0;
        let lastAddTime = 0;
        let addInterval = 1200;

        // Active lines flowing on canvas
        const activeLines = [];
        // Pattern counts
        const patternCounts = {};
        patterns.forEach(p => { patternCounts[p.id] = 0; });

        function resize() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        function getPattern(id) {
            return patterns.find(p => p.id === id);
        }

        function addSentence() {
            const sent = sentences[sentenceIndex % sentences.length];
            sentenceIndex++;
            totalProcessed++;

            const y = 100 + Math.random() * (canvas.height - 250);

            activeLines.push({
                text: sent.text,
                matches: sent.matches,
                x: canvas.width + 10,
                y,
                speed: 0.8 + Math.random() * 0.4,
                opacity: 0,
                fadeState: 'in', // in, visible, out
                highlightTime: 0,
                detected: false
            });

            // Count patterns
            sent.matches.forEach(m => {
                patternCounts[m.pattern]++;
                totalDetected++;
            });

            updatePatternPanel();
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalProcessed').textContent = totalProcessed;
            document.getElementById('totalPatterns').textContent = totalDetected;
        }

        function updatePatternPanel() {
            const list = document.getElementById('patternList');
            const maxCount = Math.max(...Object.values(patternCounts), 1);

            // Sort patterns by count descending
            const sorted = [...patterns].sort((a, b) => patternCounts[b.id] - patternCounts[a.id]);

            list.innerHTML = sorted.map(p => {
                const count = patternCounts[p.id];
                const pct = (count / maxCount * 100).toFixed(0);
                const recentHit = activeLines.some(l =>
                    l.highlightTime > 0 && l.matches.some(m => m.pattern === p.id)
                );
                return `
                    <div class="pattern-item ${recentHit ? 'highlight' : ''}">
                        <div class="pattern-name" style="color: ${p.color}">${p.name}</div>
                        <div class="pattern-count">${count}</div>
                        <div class="pattern-bar">
                            <div class="pattern-bar-fill" style="width: ${pct}%; background: ${p.color}"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- Render ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Subtle grid lines
            ctx.strokeStyle = 'rgba(255,255,255,0.02)';
            ctx.lineWidth = 1;
            for (let y = 50; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            activeLines.forEach(line => {
                const fontSize = 16;
                ctx.font = `${fontSize}px 'Yu Gothic', sans-serif`;

                // Draw each character
                let curX = line.x;
                for (let i = 0; i < line.text.length; i++) {
                    const ch = line.text[i];
                    let isHighlighted = false;
                    let highlightColor = null;

                    for (const m of line.matches) {
                        if (i >= m.start && i < m.end) {
                            isHighlighted = true;
                            highlightColor = getPattern(m.pattern).color;
                            break;
                        }
                    }

                    if (isHighlighted && line.highlightTime > 0) {
                        // Draw highlight background
                        const charW = ctx.measureText(ch).width;
                        ctx.fillStyle = highlightColor + '30';
                        ctx.fillRect(curX - 1, line.y - fontSize + 2, charW + 2, fontSize + 4);

                        // Underline
                        ctx.fillStyle = highlightColor + 'aa';
                        ctx.fillRect(curX - 1, line.y + 4, charW + 2, 2);

                        ctx.fillStyle = highlightColor;
                    } else {
                        ctx.fillStyle = `rgba(200, 210, 240, ${line.opacity * 0.7})`;
                    }

                    ctx.fillText(ch, curX, line.y);
                    curX += ctx.measureText(ch).width;
                }
            });
        }

        function update() {
            for (let i = activeLines.length - 1; i >= 0; i--) {
                const line = activeLines[i];

                // Fade in
                if (line.fadeState === 'in') {
                    line.opacity = Math.min(line.opacity + 0.04, 1);
                    if (line.opacity >= 1) line.fadeState = 'visible';
                }

                // Move left
                line.x -= line.speed * speed;

                // Highlight detection when passing center
                const centerX = canvas.width * 0.4;
                if (!line.detected && line.x < centerX) {
                    line.detected = true;
                    line.highlightTime = 120; // frames
                }
                if (line.highlightTime > 0) line.highlightTime--;

                // Fade out when off screen
                const textWidth = line.text.length * 16;
                if (line.x + textWidth < -50) {
                    activeLines.splice(i, 1);
                }
            }
        }

        // --- Animation ---
        let lastFrame = 0;
        function animate(timestamp) {
            requestAnimationFrame(animate);

            if (isAnimating) {
                if (timestamp - lastAddTime > addInterval / speed) {
                    addSentence();
                    lastAddTime = timestamp;
                }
                update();
            }

            draw();
        }

        // --- UI ---
        document.getElementById('pauseBtn').addEventListener('click', () => {
            isAnimating = !isAnimating;
            document.getElementById('pauseBtn').textContent = isAnimating ? '一時停止' : '再生';
        });
        document.getElementById('resetBtn').addEventListener('click', () => {
            activeLines.length = 0;
            sentenceIndex = 0; totalProcessed = 0; totalDetected = 0;
            patterns.forEach(p => { patternCounts[p.id] = 0; });
            updateStats(); updatePatternPanel();
            if (!isAnimating) {
                isAnimating = true;
                document.getElementById('pauseBtn').textContent = '一時停止';
            }
        });
        document.getElementById('speedBtn').addEventListener('click', () => {
            const btn = document.getElementById('speedBtn');
            if (speed === 1) { speed = 3; btn.textContent = '超高速'; }
            else if (speed === 3) { speed = 0.3; btn.textContent = '低速'; }
            else { speed = 1; btn.textContent = '高速'; }
        });

        window.addEventListener('resize', resize);
        resize();
        updatePatternPanel();
        requestAnimationFrame(animate);
    })();
    </script>
</body>
</html>
