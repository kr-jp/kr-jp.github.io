<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usage-based Learning 3D (Modern)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Yu Gothic', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background: #0f0c29;
            overflow: hidden;
            height: 100vh;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        .title-section {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            pointer-events: auto;
            width: 80%;
            z-index: 20;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .phase-indicator {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 30px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.15);
            pointer-events: auto;
            color: white;
            text-align: center;
            width: 60%;
            max-width: 750px;
            min-width: 320px;
            transition: all 0.4s ease;
            z-index: 15;
        }

        .phase-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #f093fb;
            transition: color 0.3s ease;
        }

        .phase-desc {
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255,255,255,0.85);
        }

        .info-panel {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-65%);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 18px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            gap: 20px;
            pointer-events: auto;
            min-height: 95px;
            transition: all 0.3s ease;
            z-index: 20;
        }

        .stat { text-align: center; }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
            transition: all 0.3s ease;
            font-variant-numeric: tabular-nums;
        }

        .stat-label {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-top: 5px;
            white-space: nowrap;
        }

        .controls {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            pointer-events: auto;
            align-items: center;
            transition: all 0.3s ease;
            z-index: 25;
        }

        button {
            padding: 12px 24px;
            font-size: 14px;
            background: rgba(102, 126, 234, 0.6);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        button:hover {
            background: rgba(118, 75, 162, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: rgba(240, 147, 251, 0.5);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
        }

        .phase-buttons {
            display: flex;
            gap: 10px;
            padding-left: 20px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
        }

        .phase-btn { padding: 10px 20px; font-size: 13px; }

        .legend {
            position: absolute;
            bottom: 25px;
            right: 110px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 18px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            pointer-events: auto;
            min-height: 95px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 20;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: white;
            font-size: 12px;
        }
        .legend-item:last-child { margin-bottom: 0; }
        .legend-color { width: 16px; height: 16px; border-radius: 50%; }

        @keyframes phaseChange {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
            100% { transform: translateX(-50%) scale(1); }
        }

        .phase-indicator.changing { animation: phaseChange 0.5s ease; }

        /* Tablet */
        @media (max-width: 1024px) {
            .info-panel {
                transform: translateX(-50%);
                left: 50%;
                bottom: 20px;
            }
            .legend {
                right: 20px;
                bottom: 130px;
                min-height: auto;
                padding: 15px;
            }
            .controls {
                bottom: 240px;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .title-section {
                top: 15px;
                width: 100%;
            }
            h1 { font-size: 22px; margin-bottom: 5px; }

            .legend {
                top: 15px;
                right: 10px;
                bottom: auto;
                padding: 8px 12px;
                transform: scale(0.85);
                transform-origin: top right;
                background: rgba(255,255,255,0.12);
            }
            .legend-item { margin-bottom: 4px; font-size: 11px; }

            .phase-indicator {
                top: 100px;
                width: 90%;
                padding: 15px;
            }
            .phase-title { font-size: 16px; margin-bottom: 5px; }
            .phase-desc { font-size: 12px; line-height: 1.4; }

            .controls {
                bottom: 110px;
                width: 95%;
                flex-wrap: wrap;
                justify-content: center;
                gap: 8px;
            }
            button { padding: 8px 16px; font-size: 12px; }

            .phase-buttons {
                padding-left: 0;
                border-left: none;
                width: 100%;
                justify-content: center;
                margin-top: 5px;
            }

            .info-panel {
                bottom: 10px;
                width: 96%;
                padding: 10px 5px;
                min-height: 70px;
                gap: 10px;
                justify-content: space-evenly;
            }
            .stat-number { font-size: 20px; }
            .stat-label { font-size: 10px; }
        }

        /* Landscape */
        @media (max-height: 600px) {
            .title-section { top: 5px; }
            h1 { font-size: 18px; display: inline-block; margin-right: 10px; }

            .phase-indicator {
                top: 40px;
                padding: 5px 15px;
                background: transparent;
                border: none;
            }
            .phase-desc { display: none; }
            .phase-title { font-size: 14px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

            .controls { bottom: 80px; }
            .info-panel { bottom: 5px; min-height: 60px; padding: 5px; }

            .legend {
                top: 5px;
                right: 5px;
                padding: 5px;
                transform: scale(0.7);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .phase-indicator.changing { animation: none; }
            button { transition: none; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="overlay">
        <div class="title-section">
            <h1>データに基づくパターン学習</h1>
        </div>

        <div class="phase-indicator" id="phaseIndicator">
            <div class="phase-title" id="phaseTitle">第1段階：限られたデータ</div>
            <div class="phase-desc" id="phaseDesc">
                従来の言語研究では、限られたデータに依存していました
            </div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: #667eea;"></div>
                <span>言語データ</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #f093fb;"></div>
                <span>パターン</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: linear-gradient(135deg, #ffa751, #ffe259);"></div>
                <span>言語モデル</span>
            </div>
        </div>

        <div class="controls">
            <button id="pauseBtn">一時停止</button>
            <button id="resetBtn">リセット</button>
            <div class="phase-buttons">
                <button class="phase-btn active" id="phase1Btn" data-phase="1">第1段階</button>
                <button class="phase-btn" id="phase2Btn" data-phase="2">第2段階</button>
                <button class="phase-btn" id="phase3Btn" data-phase="3">第3段階</button>
            </div>
        </div>

        <div class="info-panel">
            <div class="stat">
                <div class="stat-number" id="dataCount">0</div>
                <div class="stat-label">処理データ数</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="patternCount">0</div>
                <div class="stat-label">パターン数</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="complexityLevel">1</div>
                <div class="stat-label">モデル複雑度</div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Constants ---
        const PHASE_1_START = 0;
        const PHASE_2_START = 25;
        const PHASE_3_START = 75;
        const MAX_DATA = 150;
        const MAX_PARTICLES = 200;

        const PHASE_SPAWN_RATES = { 1: 1500, 2: 600, 3: 250 };
        const PHASE_SPAWN_COUNTS = { 1: 1, 2: 2, 3: 3 };
        const PHASE_TEXTS = {
            1: { title: '第1段階：限られたデータ', desc: '従来の言語研究では、限られたデータに依存していました。' },
            2: { title: '第2段階：データの拡大', desc: 'コンピュータの発達に伴い、多くのデータを分析することが可能になりました。' },
            3: { title: '第3段階：超大規模コーパス', desc: '現在は超大規模コーパスを用いて、言語の「生きた姿」を捉えようとしています。' }
        };

        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        // --- State ---
        let scene, camera, renderer, composer, controls;
        let centerSphere, patternLayers = [];
        let instancedParticles, connectionLines;
        let starField;
        let isAnimating = true;
        let dataProcessed = 0, patternsFormed = 0, modelComplexity = 1;
        let currentPhase = 1;
        let particleSpawnRate = PHASE_SPAWN_RATES[1];
        let lastSpawnTime = 0;
        let manualPhase = false;
        let bloomPass;

        // Camera transition state
        let cameraTransition = null;

        // Particle data arrays
        const particleData = [];

        // Dummy objects for matrix computation
        const dummy = new THREE.Object3D();
        const tempColor = new THREE.Color();

        // --- Init ---
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0f0c29, 0.003);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x0f0c29, 1);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // OrbitControls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.3;
            controls.minDistance = 25;
            controls.maxDistance = 80;
            controls.enablePan = false;
            controls.maxPolarAngle = Math.PI * 0.85;
            controls.minPolarAngle = Math.PI * 0.15;

            // Post-processing
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));

            const bloomStrength = prefersReducedMotion ? 0.4 : 0.8;
            bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                bloomStrength, 0.5, 0.6
            );
            composer.addPass(bloomPass);

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));

            const light1 = new THREE.PointLight(0x667eea, 2, 120);
            light1.position.set(25, 25, 25);
            scene.add(light1);

            const light2 = new THREE.PointLight(0xf093fb, 2, 120);
            light2.position.set(-25, -15, 25);
            scene.add(light2);

            const light3 = new THREE.PointLight(0xffa751, 1.5, 100);
            light3.position.set(0, 10, 35);
            scene.add(light3);

            createStarField();
            createCenterSphere();
            createPatternLayers();
            createInstancedParticles();
            createConnectionLines();

            // Seed initial particles
            for (let i = 0; i < 10; i++) {
                spawnParticle();
            }

            // Events
            window.addEventListener('resize', onResize);
            setupUIEvents();

            // Animation loop
            renderer.setAnimationLoop(animate);
        }

        // --- Star field ---
        function createStarField() {
            const count = 500;
            const positions = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            for (let i = 0; i < count; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 400;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 400;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 400;
                sizes[i] = Math.random() * 1.5 + 0.5;
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const mat = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.8,
                transparent: true,
                opacity: 0.6,
                sizeAttenuation: true
            });
            starField = new THREE.Points(geo, mat);
            scene.add(starField);
        }

        // --- Center sphere ---
        function createCenterSphere() {
            const geo = new THREE.SphereGeometry(5, 64, 64);
            const mat = new THREE.MeshStandardMaterial({
                color: 0xffa751,
                emissive: 0xffb347,
                emissiveIntensity: 0.6,
                metalness: 0.3,
                roughness: 0.4,
                transparent: true,
                opacity: 0.92
            });
            centerSphere = new THREE.Mesh(geo, mat);
            scene.add(centerSphere);

            // Outer glow shell
            const glowGeo = new THREE.SphereGeometry(5.8, 48, 48);
            const glowMat = new THREE.MeshStandardMaterial({
                color: 0xffe259,
                emissive: 0xffe259,
                emissiveIntensity: 0.3,
                transparent: true,
                opacity: 0.12,
                side: THREE.BackSide
            });
            const glowShell = new THREE.Mesh(glowGeo, glowMat);
            centerSphere.add(glowShell);
        }

        // --- Pattern layers ---
        function createPatternLayers() {
            patternLayers.forEach(l => centerSphere.remove(l));
            patternLayers = [];

            const detailLevels = [1, 2, 3];
            const colors = [0x88aaff, 0xf093fb, 0xc77dff];
            const baseRadius = 6;

            for (let i = 0; i < 3; i++) {
                const detail = Math.min(detailLevels[i] + Math.floor(modelComplexity / 4), 5);
                const radius = baseRadius + i * 0.6;
                const opacity = 0.18 - i * 0.04;

                const geo = new THREE.IcosahedronGeometry(radius, detail);
                const mat = new THREE.MeshBasicMaterial({
                    color: colors[i],
                    transparent: true,
                    opacity: Math.max(opacity, 0.04),
                    wireframe: true
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.userData.rotSpeed = { x: 0.0003 + i * 0.0002, y: 0.001 + i * 0.0005 };
                centerSphere.add(mesh);
                patternLayers.push(mesh);
            }
        }

        // --- Instanced particles ---
        function createInstancedParticles() {
            const geo = new THREE.IcosahedronGeometry(0.5, 1);
            const mat = new THREE.MeshStandardMaterial({
                color: 0x667eea,
                emissive: 0x667eea,
                emissiveIntensity: 0.8,
                metalness: 0.2,
                roughness: 0.4,
                transparent: true,
                opacity: 1.0
            });
            instancedParticles = new THREE.InstancedMesh(geo, mat, MAX_PARTICLES);
            instancedParticles.count = 0;
            instancedParticles.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
            scene.add(instancedParticles);
        }

        // --- Connection lines (batched) ---
        function createConnectionLines() {
            const positions = new Float32Array(MAX_PARTICLES * 2 * 3); // 2 points per line
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setDrawRange(0, 0);

            const mat = new THREE.LineBasicMaterial({
                color: 0x8899ee,
                transparent: true,
                opacity: 0.25
            });
            connectionLines = new THREE.LineSegments(geo, mat);
            scene.add(connectionLines);
        }

        // --- Spawn a particle ---
        function spawnParticle() {
            if (dataProcessed + particleData.length >= MAX_DATA + 30) return;
            if (particleData.length >= MAX_PARTICLES) return;

            const angle = Math.random() * Math.PI * 2;
            const height = (Math.random() - 0.5) * 60;
            const radius = 35 + Math.random() * 25;

            const hue = 0.6 + Math.random() * 0.08; // blue-purple range
            tempColor.setHSL(hue, 0.7, 0.6);

            particleData.push({
                x: Math.cos(angle) * radius,
                y: height,
                z: Math.sin(angle) * radius,
                speed: 0.012 + Math.random() * 0.025,
                opacity: 0,
                fadeIn: true,
                scale: 1.0,
                color: tempColor.clone(),
                absorbed: false
            });
        }

        // --- Update instanced mesh ---
        function updateParticles() {
            let activeCount = 0;
            const linePositions = connectionLines.geometry.attributes.position.array;

            for (let i = particleData.length - 1; i >= 0; i--) {
                const p = particleData[i];

                // Fade in
                if (p.fadeIn) {
                    p.opacity = Math.min(p.opacity + 0.04, 0.9);
                    if (p.opacity >= 0.9) p.fadeIn = false;
                }

                // Move toward center
                p.x += (0 - p.x) * p.speed;
                p.y += (0 - p.y) * p.speed;
                p.z += (0 - p.z) * p.speed;

                const dist = Math.sqrt(p.x * p.x + p.y * p.y + p.z * p.z);

                // Absorption
                if (dist < 6) {
                    if (!p.absorbed) {
                        p.absorbed = true;
                        p.scale = 1.5; // flash bigger
                    }
                    p.scale *= 0.85;
                    p.opacity *= 0.85;

                    if (p.scale < 0.05) {
                        particleData.splice(i, 1);
                        dataProcessed++;

                        if (dataProcessed % 8 === 0) {
                            patternsFormed++;
                            const oldComplexity = modelComplexity;
                            modelComplexity = Math.floor(dataProcessed / 15) + 1;
                            if (modelComplexity !== oldComplexity) {
                                createPatternLayers();
                            }
                            const scale = 1 + modelComplexity * 0.04;
                            centerSphere.scale.setScalar(scale);
                        }

                        updateStats();
                        updatePhase();
                        continue;
                    }
                }

                // Opacity based on distance
                if (!p.fadeIn && !p.absorbed) {
                    p.opacity = Math.min(dist / 30, 0.9);
                }

                // Set instance transform
                dummy.position.set(p.x, p.y, p.z);
                dummy.scale.setScalar(p.scale);
                dummy.updateMatrix();
                instancedParticles.setMatrixAt(activeCount, dummy.matrix);
                instancedParticles.setColorAt(activeCount, p.color);

                // Connection line
                const li = activeCount * 6;
                linePositions[li] = p.x;
                linePositions[li + 1] = p.y;
                linePositions[li + 2] = p.z;
                linePositions[li + 3] = 0;
                linePositions[li + 4] = 0;
                linePositions[li + 5] = 0;

                activeCount++;
            }

            instancedParticles.count = activeCount;
            instancedParticles.instanceMatrix.needsUpdate = true;
            if (instancedParticles.instanceColor) instancedParticles.instanceColor.needsUpdate = true;

            connectionLines.geometry.attributes.position.needsUpdate = true;
            connectionLines.geometry.setDrawRange(0, activeCount * 2);

            // Dynamic line opacity based on phase
            connectionLines.material.opacity = currentPhase === 3 ? 0.12 : 0.2;
        }

        // --- Phase management ---
        function updatePhase() {
            if (manualPhase) return;
            if (dataProcessed >= PHASE_3_START && currentPhase < 3) {
                applyPhase(3, false);
            } else if (dataProcessed >= PHASE_2_START && currentPhase < 2) {
                applyPhase(2, false);
            }
        }

        function applyPhase(phase, resetData) {
            currentPhase = phase;
            particleSpawnRate = PHASE_SPAWN_RATES[phase];

            // Phase indicator animation
            const indicator = document.getElementById('phaseIndicator');
            indicator.classList.add('changing');
            setTimeout(() => indicator.classList.remove('changing'), 500);

            // Update text
            document.getElementById('phaseTitle').textContent = PHASE_TEXTS[phase].title;
            document.getElementById('phaseDesc').textContent = PHASE_TEXTS[phase].desc;

            // Highlight button
            document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`phase${phase}Btn`).classList.add('active');

            // Camera transition
            const targetZ = phase === 1 ? 50 : phase === 2 ? 45 : 40;
            cameraTransition = { targetZ, progress: 0 };

            // Bloom spike on transition
            if (!prefersReducedMotion) {
                bloomPass.strength = 1.5;
            }

            if (resetData) {
                // Clear particles
                particleData.length = 0;

                if (phase === 1) dataProcessed = PHASE_1_START;
                else if (phase === 2) dataProcessed = PHASE_2_START;
                else dataProcessed = PHASE_3_START;

                patternsFormed = Math.floor(dataProcessed / 8);
                modelComplexity = Math.floor(dataProcessed / 15) + 1;
                centerSphere.scale.setScalar(1 + modelComplexity * 0.04);
                createPatternLayers();
                updateStats();

                // Burst spawn
                const burstCount = phase === 1 ? 10 : phase === 2 ? 15 : 20;
                for (let i = 0; i < burstCount; i++) spawnParticle();
            }
        }

        // --- Animate ---
        function animate() {
            const now = Date.now();

            // Controls always update (even when "paused")
            controls.update();

            // Star field subtle rotation
            if (starField) starField.rotation.y += 0.00005;

            // Bloom decay back to normal
            const targetBloom = prefersReducedMotion ? 0.4 : 0.8;
            if (bloomPass.strength > targetBloom + 0.01) {
                bloomPass.strength += (targetBloom - bloomPass.strength) * 0.03;
            }

            // Camera transition
            if (cameraTransition) {
                cameraTransition.progress += 0.02;
                const t = Math.min(cameraTransition.progress, 1);
                const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                camera.position.z += (cameraTransition.targetZ - camera.position.z) * ease * 0.05;
                if (t >= 1) cameraTransition = null;
            }

            if (isAnimating) {
                // Spawn particles
                if (now - lastSpawnTime > particleSpawnRate && dataProcessed < MAX_DATA) {
                    const count = PHASE_SPAWN_COUNTS[currentPhase] || 1;
                    for (let i = 0; i < count; i++) spawnParticle();
                    lastSpawnTime = now;
                }

                // Center sphere animations
                centerSphere.rotation.y += 0.004;
                const breathe = Math.sin(now * 0.001) * 0.15;
                centerSphere.material.emissiveIntensity = 0.6 + breathe;

                // Pattern layer rotation
                patternLayers.forEach(layer => {
                    const s = layer.userData.rotSpeed;
                    layer.rotation.x += s.x;
                    layer.rotation.y += s.y;
                });

                // Update particles
                updateParticles();
            }

            composer.render();
        }

        // --- UI ---
        function updateStats() {
            document.getElementById('dataCount').textContent = dataProcessed;
            document.getElementById('patternCount').textContent = patternsFormed;
            document.getElementById('complexityLevel').textContent = modelComplexity;
        }

        function setupUIEvents() {
            document.getElementById('pauseBtn').addEventListener('click', () => {
                isAnimating = !isAnimating;
                document.getElementById('pauseBtn').textContent = isAnimating ? '一時停止' : '再生';
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                particleData.length = 0;
                dataProcessed = 0;
                patternsFormed = 0;
                modelComplexity = 1;
                currentPhase = 1;
                particleSpawnRate = PHASE_SPAWN_RATES[1];
                lastSpawnTime = 0;
                manualPhase = false;
                centerSphere.scale.setScalar(1);
                createPatternLayers();
                updateStats();
                applyPhase(1, false);

                for (let i = 0; i < 10; i++) spawnParticle();

                if (!isAnimating) {
                    isAnimating = true;
                    document.getElementById('pauseBtn').textContent = '一時停止';
                }
            });

            document.querySelectorAll('.phase-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const phase = parseInt(btn.dataset.phase);
                    manualPhase = true;
                    applyPhase(phase, true);
                });
            });

            window.addEventListener('resize', onResize);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Start ---
        init();
    </script>
</body>
</html>
