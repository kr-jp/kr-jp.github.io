<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用法基盤モデル — 言語パターンの可視化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Yu Gothic', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background: #0a0a1a;
            color: white;
            overflow: hidden;
            height: 100vh;
        }
        #canvas-container { width: 100%; height: 100%; position: relative; }
        canvas { display: block; }

        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: 10;
        }

        .title-section {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; pointer-events: auto; z-index: 20;
        }
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 8px;
        }
        .subtitle { font-size: 14px; color: rgba(255,255,255,0.6); }

        .phase-indicator {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.06); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 16px 28px; border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: auto; color: white; text-align: center;
            max-width: 600px; width: 70%; min-width: 300px;
            transition: all 0.4s ease; z-index: 15;
        }
        .phase-title { font-size: 16px; font-weight: bold; color: #f093fb; margin-bottom: 6px; }
        .phase-desc { font-size: 13px; line-height: 1.5; color: rgba(255,255,255,0.8); }

        /* Bottom bar: controls + stats grouped together */
        .bottom-bar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            pointer-events: auto; z-index: 25;
        }
        .controls {
            display: flex; gap: 10px;
            flex-wrap: wrap; justify-content: center;
        }
        button {
            padding: 8px 20px; font-size: 13px;
            background: rgba(102, 126, 234, 0.4); color: white;
            border: 1px solid rgba(255,255,255,0.15); border-radius: 22px;
            cursor: pointer; transition: all 0.3s;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            white-space: nowrap; min-width: 80px;
        }
        button:hover {
            background: rgba(118, 75, 162, 0.6);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
        }
        button.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: rgba(240, 147, 251, 0.4);
        }

        .info-panel {
            background: rgba(255,255,255,0.06); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 32px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; gap: 24px;
        }
        .stat { text-align: center; }
        .stat-number {
            font-size: 26px; font-weight: bold; color: #fff;
            font-variant-numeric: tabular-nums;
        }
        .stat-label { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }

        /* Tooltip */
        .tooltip {
            position: absolute; display: none;
            background: rgba(20,20,40,0.95); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 14px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            font-size: 12px; color: white; pointer-events: none;
            z-index: 30; max-width: 200px;
            white-space: pre-line;
        }
        .tooltip-word { font-size: 16px; font-weight: bold; color: #f093fb; margin-bottom: 4px; }
        .tooltip-info { color: rgba(255,255,255,0.7); line-height: 1.4; }

        @media (max-width: 768px) {
            h1 { font-size: 20px; }
            .phase-indicator { top: 90px; width: 90%; padding: 12px; }
            .phase-title { font-size: 14px; }
            .phase-desc { font-size: 11px; }
            button { padding: 7px 14px; font-size: 11px; min-width: 70px; }
            .info-panel { padding: 8px 18px; gap: 16px; }
            .stat-number { font-size: 20px; }
        }
        @media (max-height: 600px) {
            .title-section { top: 5px; }
            h1 { font-size: 18px; }
            .subtitle { display: none; }
            .phase-indicator { top: 40px; padding: 6px 14px; background: transparent; border: none; }
            .phase-desc { display: none; }
            .bottom-bar { bottom: 5px; gap: 6px; }
            .info-panel { padding: 6px 16px; }
            .stat-number { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="networkCanvas"></canvas>
    </div>

    <div class="overlay">
        <div class="title-section">
            <h1>言語パターンのネットワーク</h1>
            <div class="subtitle">用法基盤モデル — 共起関係の可視化</div>
        </div>

        <div class="phase-indicator" id="phaseIndicator">
            <div class="phase-title" id="phaseTitle">データ収集中…</div>
            <div class="phase-desc" id="phaseDesc">
                言語データが蓄積されると、単語同士の共起パターンが浮かび上がります
            </div>
        </div>

        <div class="bottom-bar">
            <div class="controls">
                <button id="pauseBtn">⏸ 一時停止</button>
                <button id="resetBtn">↻ リセット</button>
                <button id="speedBtn" class="active">1× 通常</button>
            </div>
            <div class="info-panel">
                <div class="stat">
                    <div class="stat-number" id="wordCount">0</div>
                    <div class="stat-label">語彙数</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="linkCount">0</div>
                    <div class="stat-label">共起関係</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="patternCount">0</div>
                    <div class="stat-label">パターン</div>
                </div>
            </div>
        </div>
    </div>

    <div class="tooltip" id="tooltip">
        <div class="tooltip-word" id="tooltipWord"></div>
        <div class="tooltip-info" id="tooltipInfo"></div>
    </div>

    <script>
    (() => {
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');

        // --- Corpus data: word groups with co-occurrence relationships ---
        const wordGroups = [
            { words: ['食べる', 'ご飯', '朝', '晩', '昼'], category: '食事', color: '#667eea' },
            { words: ['食べる', 'パン', '焼く', 'バター', 'トースト'], category: '食事', color: '#667eea' },
            { words: ['飲む', 'コーヒー', '朝', 'カフェ', 'お茶'], category: '飲み物', color: '#5b8def' },
            { words: ['読む', '本', '図書館', '小説', '新聞'], category: '読書', color: '#7c6eea' },
            { words: ['書く', '手紙', 'メール', '送る', '届く'], category: '通信', color: '#9b6eea' },
            { words: ['歩く', '道', '散歩', '公園', '走る'], category: '移動', color: '#ea6eb7' },
            { words: ['見る', 'テレビ', '映画', '番組', '動画'], category: '視聴', color: '#f093fb' },
            { words: ['話す', '友達', '電話', '会話', '笑う'], category: '会話', color: '#ea8c6e' },
            { words: ['勉強', '学校', '先生', '授業', 'テスト'], category: '学習', color: '#6eeaa8' },
            { words: ['寝る', '夜', '起きる', '朝', '眠い'], category: '生活', color: '#eae16e' },
            // Grammar patterns
            { words: ['〜てしまう', '〜ちゃう', '食べ', '忘れ', '言っ'], category: '文法', color: '#ff6b9d' },
            { words: ['〜ている', '〜てる', '読ん', '待っ', '考え'], category: '文法', color: '#ff6b9d' },
        ];

        // --- State ---
        let nodes = [];
        let links = [];
        let isAnimating = true;
        let speed = 1;
        let groupIndex = 0;
        let wordIndex = 0;
        let lastAddTime = 0;
        let addInterval = 800;
        let patternsFound = 0;
        let isDragging = false;
        let dragNode = null;
        let mouseX = 0, mouseY = 0;
        let hoverNode = null;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function findNode(word) {
            return nodes.find(n => n.word === word);
        }

        function addWord(word, category, color) {
            let existing = findNode(word);
            if (existing) {
                existing.frequency++;
                existing.targetRadius = Math.min(6 + existing.frequency * 1.5, 24);
                return existing;
            }

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const angle = Math.random() * Math.PI * 2;
            const dist = 100 + Math.random() * 150;

            const node = {
                word,
                category,
                color,
                x: cx + Math.cos(angle) * dist,
                y: cy + Math.sin(angle) * dist,
                vx: 0, vy: 0,
                radius: 0,
                targetRadius: 8,
                frequency: 1,
                opacity: 0,
                born: Date.now()
            };
            nodes.push(node);
            return node;
        }

        function addLink(a, b) {
            let existing = links.find(l =>
                (l.source === a && l.target === b) || (l.source === b && l.target === a)
            );
            if (existing) {
                existing.strength = Math.min(existing.strength + 0.3, 4);
                return;
            }
            links.push({
                source: a, target: b,
                strength: 0.5,
                opacity: 0
            });
        }

        function addNextWord() {
            if (groupIndex >= wordGroups.length) {
                groupIndex = 0;
            }

            const group = wordGroups[groupIndex];
            const word = group.words[wordIndex];
            const node = addWord(word, group.category, group.color);

            // Link to previously added words in same group
            for (let i = 0; i < wordIndex; i++) {
                const prev = findNode(group.words[i]);
                if (prev) addLink(node, prev);
            }

            wordIndex++;
            if (wordIndex >= group.words.length) {
                wordIndex = 0;
                groupIndex++;
                patternsFound++;
            }

            updateStats();
            updatePhaseText();
        }

        function updateStats() {
            document.getElementById('wordCount').textContent = nodes.length;
            document.getElementById('linkCount').textContent = links.length;
            document.getElementById('patternCount').textContent = patternsFound;
        }

        function updatePhaseText() {
            const n = nodes.length;
            const el = document.getElementById('phaseTitle');
            const desc = document.getElementById('phaseDesc');

            if (n < 10) {
                el.textContent = 'データ収集中…';
                desc.textContent = '言語データが蓄積されると、単語同士の共起パターンが浮かび上がります';
            } else if (n < 25) {
                el.textContent = 'パターンが見え始めています';
                desc.textContent = '同じ文脈で使われる単語同士が近づき、クラスターを形成しています';
            } else if (n < 40) {
                el.textContent = 'ネットワーク構造の発達';
                desc.textContent = '共起頻度の高いペアほど結びつきが強くなり、コロケーションとして定着します';
            } else {
                el.textContent = '言語知識の構造化';
                desc.textContent = '十分なデータから、文法パターンや慣用表現が浮かび上がりました';
            }
        }

        // --- Physics simulation ---
        function simulate() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // Center gravity
            nodes.forEach(node => {
                const dx = cx - node.x;
                const dy = cy - node.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 0) {
                    node.vx += (dx / dist) * 0.05;
                    node.vy += (dy / dist) * 0.05;
                }
            });

            // Node repulsion
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const a = nodes[i], b = nodes[j];
                    let dx = b.x - a.x;
                    let dy = b.y - a.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 1) dist = 1;
                    const minDist = 50;
                    if (dist < minDist) {
                        const force = (minDist - dist) / dist * 0.8;
                        const fx = dx * force;
                        const fy = dy * force;
                        a.vx -= fx; a.vy -= fy;
                        b.vx += fx; b.vy += fy;
                    }
                }
            }

            // Link attraction
            links.forEach(link => {
                const a = link.source, b = link.target;
                let dx = b.x - a.x;
                let dy = b.y - a.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 1) dist = 1;
                const targetDist = 60 - link.strength * 5;
                const force = (dist - targetDist) / dist * 0.02 * link.strength;
                const fx = dx * force;
                const fy = dy * force;
                a.vx += fx; a.vy += fy;
                b.vx -= fx; b.vy -= fy;
            });

            // Apply velocity with damping
            nodes.forEach(node => {
                if (node === dragNode) return;
                node.vx *= 0.85;
                node.vy *= 0.85;
                node.x += node.vx;
                node.y += node.vy;

                // Keep in bounds
                const margin = 60;
                node.x = Math.max(margin, Math.min(canvas.width - margin, node.x));
                node.y = Math.max(margin, Math.min(canvas.height - margin, node.y));
            });

            // Animate properties
            nodes.forEach(node => {
                node.opacity = Math.min(node.opacity + 0.03, 1);
                node.radius += (node.targetRadius - node.radius) * 0.08;
            });
            links.forEach(link => {
                link.opacity = Math.min(link.opacity + 0.02, 0.8);
            });
        }

        // --- Helper: get connected nodes ---
        function getConnectedNodes(node) {
            const connected = new Set();
            links.forEach(l => {
                if (l.source === node) connected.add(l.target);
                if (l.target === node) connected.add(l.source);
            });
            return connected;
        }

        // --- Helper: parse hex color to RGB ---
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        // --- Render ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const connectedToHover = hoverNode ? getConnectedNodes(hoverNode) : new Set();
            const dimming = hoverNode !== null;

            // Draw links
            links.forEach(link => {
                const a = link.source, b = link.target;
                let alpha = link.opacity * 0.5;
                const width = link.strength;

                // Color links by source node category color
                const linkColor = hexToRgb(a.color);

                if (dimming) {
                    const isHighlighted = (a === hoverNode || b === hoverNode);
                    if (isHighlighted) {
                        alpha = Math.min(link.opacity * 0.9, 0.8);
                    } else {
                        alpha *= 0.15;
                    }
                }

                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.strokeStyle = `rgba(${linkColor.r}, ${linkColor.g}, ${linkColor.b}, ${alpha})`;
                ctx.lineWidth = width;
                ctx.stroke();
            });

            // Draw nodes
            nodes.forEach(node => {
                const r = node.radius;
                if (r < 0.5) return;

                let nodeAlpha = node.opacity;
                if (dimming && node !== hoverNode && !connectedToHover.has(node)) {
                    nodeAlpha *= 0.25;
                }

                // Glow
                const glow = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, r * 3);
                glow.addColorStop(0, node.color + (dimming && nodeAlpha < 0.5 ? '15' : '40'));
                glow.addColorStop(1, node.color + '00');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(node.x, node.y, r * 3, 0, Math.PI * 2);
                ctx.fill();

                // Node circle
                ctx.beginPath();
                ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
                const isHighlighted = node === hoverNode || connectedToHover.has(node);
                ctx.fillStyle = node.color + (isHighlighted ? 'ff' : (dimming ? '40' : 'cc'));
                ctx.fill();

                if (node === hoverNode) {
                    ctx.strokeStyle = '#ffffffaa';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else if (connectedToHover.has(node)) {
                    ctx.strokeStyle = '#ffffff44';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }

                // Label
                const fontSize = Math.max(10, Math.min(r * 1.2, 16));
                ctx.font = `bold ${fontSize}px 'Yu Gothic', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = `rgba(255,255,255,${nodeAlpha * 0.95})`;
                ctx.fillText(node.word, node.x, node.y - r - 10);
            });
        }

        // --- Animation loop ---
        function animate(timestamp) {
            requestAnimationFrame(animate);

            if (isAnimating) {
                if (timestamp - lastAddTime > addInterval / speed) {
                    addNextWord();
                    lastAddTime = timestamp;
                }
                simulate();
            }

            draw();
        }

        // --- Interaction ---
        function getNodeAt(x, y) {
            for (let i = nodes.length - 1; i >= 0; i--) {
                const n = nodes[i];
                const dx = x - n.x;
                const dy = y - n.y;
                if (dx * dx + dy * dy < (n.radius + 8) * (n.radius + 8)) {
                    return n;
                }
            }
            return null;
        }

        canvas.addEventListener('mousedown', e => {
            const node = getNodeAt(e.clientX, e.clientY);
            if (node) {
                isDragging = true;
                dragNode = node;
            }
        });

        canvas.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            if (isDragging && dragNode) {
                dragNode.x = e.clientX;
                dragNode.y = e.clientY;
                dragNode.vx = 0;
                dragNode.vy = 0;
            }

            const node = getNodeAt(e.clientX, e.clientY);
            hoverNode = node;
            const tooltip = document.getElementById('tooltip');
            if (node) {
                canvas.style.cursor = 'pointer';
                const connCount = links.filter(l => l.source === node || l.target === node).length;
                document.getElementById('tooltipWord').textContent = node.word;
                document.getElementById('tooltipInfo').textContent =
                    `カテゴリー: ${node.category}\n出現回数: ${node.frequency}\n共起関係: ${connCount}`;
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY - 10) + 'px';
            } else {
                canvas.style.cursor = 'default';
                tooltip.style.display = 'none';
            }
        });

        canvas.addEventListener('mouseup', () => { isDragging = false; dragNode = null; });
        canvas.addEventListener('mouseleave', () => {
            isDragging = false; dragNode = null; hoverNode = null;
            document.getElementById('tooltip').style.display = 'none';
        });

        // Touch
        canvas.addEventListener('touchstart', e => {
            const t = e.touches[0];
            const node = getNodeAt(t.clientX, t.clientY);
            if (node) { isDragging = true; dragNode = node; e.preventDefault(); }
        }, { passive: false });
        canvas.addEventListener('touchmove', e => {
            if (isDragging && dragNode) {
                dragNode.x = e.touches[0].clientX;
                dragNode.y = e.touches[0].clientY;
                dragNode.vx = 0; dragNode.vy = 0;
                e.preventDefault();
            }
        }, { passive: false });
        canvas.addEventListener('touchend', () => { isDragging = false; dragNode = null; });

        // UI buttons
        const pauseBtn = document.getElementById('pauseBtn');
        const speedBtn = document.getElementById('speedBtn');

        pauseBtn.addEventListener('click', () => {
            isAnimating = !isAnimating;
            pauseBtn.textContent = isAnimating ? '⏸ 一時停止' : '▶ 再生';
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            nodes = []; links = []; groupIndex = 0; wordIndex = 0;
            patternsFound = 0; lastAddTime = 0;
            updateStats(); updatePhaseText();
            if (!isAnimating) {
                isAnimating = true;
                pauseBtn.textContent = '⏸ 一時停止';
            }
        });

        speedBtn.addEventListener('click', () => {
            if (speed === 1) { speed = 3; speedBtn.textContent = '3× 高速'; }
            else if (speed === 3) { speed = 0.5; speedBtn.textContent = '½× 低速'; }
            else { speed = 1; speedBtn.textContent = '1× 通常'; }
        });

        // Init
        window.addEventListener('resize', resize);
        resize();
        requestAnimationFrame(animate);
    })();
    </script>
</body>
</html>
